// Per the File System Access API, getAsFileSystemHandle()/getAsFile() must be
// called synchronously off the drop event before any other await, so all items
// are grabbed up front rather than looping with awaits in between.
async function getAllDroppedFiles(dt){
  const results = [];
  try{
    if(dt.items && dt.items.length){
      const fileItems = Array.from(dt.items).filter(it => it.kind === 'file');
      const handlePromises = fileItems.map(it =>
        typeof it.getAsFileSystemHandle === 'function' ? it.getAsFileSystemHandle() : Promise.resolve(null)
      );
      const fallbackFiles = fileItems.map(it => it.getAsFile());
      const handles = await Promise.all(handlePromises.map(p => Promise.resolve(p).catch(()=>null)));
      for(let i=0;i<fileItems.length;i++){
        let handle = handles[i];
        let file = null;
        if(handle && handle.kind === 'file'){
          try{ file = await handle.getFile(); }catch(err){ handle = null; }
        }
        if(!file) file = fallbackFiles[i];
        if(file) results.push({ file, handle: (handle && handle.kind==='file') ? handle : null });
      }
    }
    if(!results.length && dt.files && dt.files.length){
      Array.from(dt.files).forEach(f => results.push({ file: f, handle: null }));
    }
  }catch(err){
    if(!results.length && dt.files && dt.files.length){
      Array.from(dt.files).forEach(f => results.push({ file: f, handle: null }));
    }
  }
  return results;
}

async function loadFileIntoColumn(col, file, handle){
  const text = await file.text();
  resetHistory(col);
  state.cols[col].text = text;
  state.cols[col].fullPath = file.webkitRelativePath || file.name;
  state.cols[col].userLoaded = true;
  state.cols[col].handle = handle || null; // null if this browser can't give a reusable handle
  syncPathInput(col);
}

function setActiveModeButtons(mode){
  document.getElementById('btn-2way').classList.toggle('active', mode==='2way');
  document.getElementById('btn-3way').classList.toggle('active', mode==='3way');
}

async function loadDroppedFile(col, dt){
  const entries = await getAllDroppedFiles(dt);
  if(!entries.length){ setStatus(`${colLabel(col)}: no file detected in the drop`); return; }

  if(entries.length >= 2){
    // Multiple files dropped at once: auto-switch mode and fill left-to-right,
    // regardless of which specific pane/path bar the files landed on.
    const wantMode = entries.length >= 3 ? '3way' : '2way';
    const useCols = wantMode==='3way' ? ['left','mid','right'] : ['left','right'];
    state.mode = wantMode;
    setActiveModeButtons(wantMode);
    try{
      for(let i=0;i<useCols.length;i++){
        await loadFileIntoColumn(useCols[i], entries[i].file, entries[i].handle);
      }
      recompute();
      const summary = useCols.map((c,i)=>`${colLabel(c)}=${entries[i].file.name}`).join(', ');
      setStatus(`Switched to ${wantMode} and loaded ${useCols.length} files via drag & drop: ${summary}`);
    }catch(err){
      setStatus('Failed to read one or more dropped files');
    }
    return;
  }

  // Single file: load into whichever zone it was dropped on (unchanged behavior)
  try{
    await loadFileIntoColumn(col, entries[0].file, entries[0].handle);
    recompute();
    setStatus(`Loaded ${colLabel(col)} via drag & drop: ${state.cols[col].fullPath}`);
  }catch(err){
    setStatus(`${colLabel(col)}: failed to read dropped file`);
  }
}

function setupDropZone(el, col){
  if(!el) return;
  let dragDepth = 0;
  el.addEventListener('dragenter', (e)=>{
    if(!isFileDrag(e)) return;
    e.preventDefault();
    dragDepth++;
    el.classList.add('drag-over');
  });
  el.addEventListener('dragover', (e)=>{
    if(!isFileDrag(e)) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
  });
  el.addEventListener('dragleave', (e)=>{
    if(!isFileDrag(e)) return;
    dragDepth = Math.max(0, dragDepth-1);
    if(dragDepth===0) el.classList.remove('drag-over');
  });
  el.addEventListener('drop', (e)=>{
    if(!isFileDrag(e)) return;
    e.preventDefault();
    dragDepth = 0;
    el.classList.remove('drag-over');
    loadDroppedFile(col, e.dataTransfer);
  });
}

function setupAllDropZones(){
  // Content area: drop a file anywhere on a pane to load it into that column.
  setupDropZone(document.getElementById('pane-left'), 'left');
  setupDropZone(document.getElementById('pane-mid'), 'mid');
  setupDropZone(document.getElementById('pane-right'), 'right');
}

/* ======================================================================
   Status bar helper
   ====================================================================== */
function setStatus(msg){
  document.getElementById('status-text').textContent = msg;
}

/* ======================================================================
   Scroll sync between panes
   ====================================================================== */
let syncingScroll = false;
// When we programmatically set another pane's scrollTop/scrollLeft below,
// the browser still fires that pane's own 'scroll' event -- just
// asynchronously, after this handler (and its `syncingScroll` guard) has
// already finished and reset. That echo therefore isn't blocked by
// `syncingScroll` and re-enters this same logic for that pane, which then
// pushes new positions back to the others. Away from any add/del gap this
// is harmless (every column's layout agrees, so the echo computes the same
// position and nothing actually changes), but right at a gap the columns'
// layouts disagree (collapsed rows share one offset in the gap's column
// while the other column still has real height there), so each echo
// nudges the panes to slightly different positions and they fight over
// scrollTop instead of settling -- the jitter/stuck feel when scrolling
// past an added or deleted block. Tracking, per pane, that its very next
// 'scroll' event is just our own echo (and skipping it instead of
// re-syncing from it) breaks that loop.
const ignoreNextScroll = { left:false, mid:false, right:false };

function setupScrollSync(){
  const ids = ['scroll-left','scroll-mid','scroll-right'];
  const idToCol = id => id.slice('scroll-'.length);
  ids.forEach(id=>{
    const col = idToCol(id);
    document.getElementById(id).addEventListener('scroll', (e)=>{
      if(ignoreNextScroll[col]){ ignoreNextScroll[col] = false; return; }
      if(syncingScroll) return;
      syncingScroll = true;
      const srcCol = col;
      const top = e.target.scrollTop;
      const left = e.target.scrollLeft;
      // Find which row is at this pane's scroll position, then align every
      // other pane to that same row using its own real layout, so the
      // actual diff position stays lined up even if the panes' total
      // rendered heights differ (due to collapsed add/del gaps).
      const row = rowAtOffset(srcCol, top);
      const remainder = top - offsetForRow(srcCol, row);
      ids.forEach(other=>{
        if(other!==id){
          const el = document.getElementById(other);
          if(!el.closest('.pane').classList.contains('hidden')){
            const otherCol = idToCol(other);
            const newTop = Math.max(0, offsetForRow(otherCol, row) + remainder);
            // Only expect (and thus only ignore) an echo if we're actually
            // changing something -- an unchanged scrollTop/scrollLeft fires
            // no 'scroll' event at all, so flagging it anyway would leave
            // the flag stuck and wrongly swallow the pane's next real
            // user-initiated scroll.
            if(newTop !== el.scrollTop || left !== el.scrollLeft){
              ignoreNextScroll[otherCol] = true;
            }
            el.scrollTop = newTop;
            el.scrollLeft = left; // Sync horizontal scroll too, to make diff comparison easier
          }
        }
      });
      syncingScroll = false;
      updateGutterViewport();
    });
  });
}

   Event wiring
   ====================================================================== */

document.getElementById('btn-2way').addEventListener('click', ()=>{
  state.mode='2way';
  document.getElementById('btn-2way').classList.add('active');
  document.getElementById('btn-3way').classList.remove('active');

});

  // When switching from 2-way to 3-way:
  // Keep left and right exactly as they are.
  // Mid stays as-is (empty or previously loaded). Do NOT move right->mid.
  state.mode='3way';

document.getElementById('nav-first').addEventListener('click', ()=>goToDiff('first'));
document.getElementById('nav-prev').addEventListener('click', ()=>goToDiff('prev'));
document.getElementById('nav-next').addEventListener('click', ()=>goToDiff('next'));

document.getElementById('btn-recompute').addEventListener('click', async () => {
  setStatus('Reloading files and recomputing diff...');
  
  // Reload each column that has a previously loaded file, in order
  if (state.cols.left.userLoaded)  await refreshFile('left');
  if (state.mode === '3way' && state.cols.mid.userLoaded)   await refreshFile('mid');
  if (state.cols.right.userLoaded) await refreshFile('right');
  
  // refreshFile already calls recompute() internally on success,
  // but call it again here to force a refresh even if no file actually changed
  recompute();
  setStatus('All files reloaded and diff recomputed');
});

/* Path bar buttons */
document.querySelectorAll('.pathrow .filebtns .tbtn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const act = btn.dataset.act;

document.querySelectorAll('.pathrow .swap-btn').forEach(btn=>{

/* Delegate clicks on action buttons (hover icons) and content edits */
document.getElementById('editor-wrap').addEventListener('click', (e)=>{
  const actBtn = e.target.closest('.actbtn');
  if(actBtn){
    const action = actBtn.dataset.action;
    const row = parseInt(actBtn.dataset.row,10);
    const col = actBtn.dataset.col;
    if(action==='copy-right'){
      const toCol = state.mode==='3way'
        ? (col==='left' ? 'mid' : 'right')
        : 'right';
      mergeBlock(row, col, toCol);
    } else if(action==='copy-left'){
      const toCol = state.mode==='3way'
        ? (col==='right' ? 'mid' : 'left')
        : 'left';
      mergeBlock(row, col, toCol);

      deleteBlock(row, col);
    }
  }
});

document.getElementById('editor-wrap').addEventListener('input', (e)=>{
  if(e.target.classList.contains('content') && e.target.isContentEditable){
    onContentInput(e);
  }
});

/* Track where the user actually places the caret, so First/Prev/Next/Last
   can navigate relative to it instead of an independently-stepped counter. */
document.getElementById('editor-wrap').addEventListener('focusin', (e)=>{
  const el = e.target.closest('.content[contenteditable="true"]');
  if(!el) return;
  const row = parseInt(el.dataset.row, 10);
  const col = el.dataset.col;
  if(!Number.isNaN(row) && col){
    state.cursorRow = row;
    state.cursorCol = col;
    state.cursorGapAnchor = null;
    updateDiffNavButtonStates();
  }
});

/* ======================================================================
   Keyboard Up/Down navigation: move the caret to the same horizontal
   position on the previous/next real (non-gap) line within the same
   column, since each line is its own separate contenteditable div and
   the browser has no notion of "the line above" across that boundary.
   ====================================================================== */

/* Character offset of the caret within el's own text content (counting
   through any nested spans, e.g. the intra-line diff highlight markup). */
function getCaretCharOffset(el){
  const sel = window.getSelection();
  if(!sel || sel.rangeCount===0) return 0;
  const range = sel.getRangeAt(0);
  if(!el.contains(range.startContainer)) return 0;
  const pre = document.createRange();
  pre.selectNodeContents(el);
  pre.setEnd(range.startContainer, range.startOffset);
  return pre.toString().length;
}

/* Place the caret at the given character offset within el (clamped to
   el's text length), walking through any nested text nodes. */
function setCaretCharOffset(el, offset){
  const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
  let remaining = offset;
  let node = walker.nextNode();
  let target = el, targetOffset = 0;
  while(node){
    const len = node.textContent.length;
    if(remaining <= len){ target = node; targetOffset = remaining; break; }
    remaining -= len;
    const next = walker.nextNode();
    if(!next){ target = node; targetOffset = len; break; } // clamp to end of last text node
    node = next;
  }
  const sel = window.getSelection();
  if(!sel) return;
  const range = document.createRange();
  try{
    range.setStart(target, targetOffset);
    range.collapse(true);
    sel.removeAllRanges();
    sel.addRange(range);
  }catch(err){ /* ignore */ }
}

document.getElementById('editor-wrap').addEventListener('keydown', (e)=>{
  if(e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
  if(e.shiftKey || e.ctrlKey || e.metaKey || e.altKey) return; // leave modified combos to default handling
  const el = e.target.closest && e.target.closest('.content[contenteditable="true"]');
  if(!el) return;

  const col = el.dataset.col;
  const container = document.getElementById('lines-' + col);
  if(!container) return;
  // Only the real (non-gap) lines in this column have a .content element,
  // in top-to-bottom order, so stepping through this list already skips
  // gap markers correctly.
  const allContents = Array.from(container.querySelectorAll('.content[contenteditable="true"]'));
  const idx = allContents.indexOf(el);
  if(idx === -1) return;
  const targetIdx = e.key==='ArrowDown' ? idx+1 : idx-1;
  if(targetIdx < 0 || targetIdx >= allContents.length) return; // already at first/last line

  e.preventDefault();
  const charOffset = getCaretCharOffset(el);
  const targetEl = allContents[targetIdx];
  targetEl.focus({preventScroll:true});
  setCaretCharOffset(targetEl, charOffset);

  // Scroll the target line into view within its own pane only if needed,
  // without disturbing horizontal scroll position.
  const paneScroll = container.parentElement;
  const lineEl = targetEl.closest('.line');
  if(paneScroll && lineEl){
    const scrollRect = paneScroll.getBoundingClientRect();
    const lineRect = lineEl.getBoundingClientRect();
    if(lineRect.top < scrollRect.top){
      paneScroll.scrollTop -= (scrollRect.top - lineRect.top);
    } else if(lineRect.bottom > scrollRect.bottom){
      paneScroll.scrollTop += (lineRect.bottom - scrollRect.bottom);
    }
  }
});

/* ======================================================================
   Delete-at-end-of-line / Backspace-at-start-of-line: each line is its
   own separate contenteditable div (see renderColumn), so by default
   there's nothing on the other side of the div boundary for these keys to
   reach across -- pressing Delete at the end of a line or Backspace at
   the start of one would otherwise just do nothing. Handle both here so
   they behave like a normal text editor: merge this line with the
   neighboring one in the same column, dropping the newline between them.
   ====================================================================== */

/* Merge the line at index firstIdx with the line right after it
   (firstIdx+1) in the given column, placing the caret at the join point.
   Used for both Delete (firstIdx = current line) and Backspace
   (firstIdx = previous line) since both collapse the same pair of lines. */
function mergeLinesInColumn(col, firstIdx){
  const container = document.getElementById('lines-' + col);
  if(!container) return;
  // Pull every line's LIVE (possibly not-yet-committed) text straight from
  // the DOM -- same approach as commitColumnEdits -- so this still works
  // correctly if the user is mid-edit and the background commit debounce
  // for this column hasn't fired yet.
  const lineEls = container.querySelectorAll('.line:not(.empty) .content[contenteditable="true"]');
  const liveLines = [];
  lineEls.forEach(el=>{ liveLines[+el.dataset.lineIdx] = el.textContent.replace(/\r/g, ''); });

  if(firstIdx < 0 || firstIdx+1 >= liveLines.length) return; // nothing on the other side to merge with

  // A pending debounced commit from ordinary typing is now superseded by
  // this merge (which already reads the live, up-to-the-moment text) --
  // cancel it so it doesn't redundantly re-fire and re-render afterward.
  if(editDebounce){ clearTimeout(editDebounce); editDebounce = null; }

  const firstLen = liveLines[firstIdx].length;
  const merged = liveLines[firstIdx] + liveLines[firstIdx+1];
  liveLines.splice(firstIdx, 2, merged);

  pushHistory(col);
  state.cols[col].text = liveLines.join('\n');
  recompute({keepView:true, restoreCaret:{col, lineIdx:firstIdx, offset:firstLen}});
}

document.getElementById('editor-wrap').addEventListener('keydown', (e)=>{
  if(e.key !== 'Delete' && e.key !== 'Backspace') return;
  if(e.shiftKey || e.ctrlKey || e.metaKey || e.altKey) return; // leave modified combos (e.g. word-delete) to default handling
  const el = e.target.closest && e.target.closest('.content[contenteditable="true"]');
  if(!el) return;

  const sel = window.getSelection();
  if(!sel || sel.rangeCount===0 || !sel.isCollapsed) return; // an actual selection: let the browser's normal delete-selection behavior run

  const col = el.dataset.col;
  const lineIdx = parseInt(el.dataset.lineIdx, 10);
  if(Number.isNaN(lineIdx)) return;

  const caretOffset = getCaretCharOffset(el);
  const textLen = el.textContent.length;

  if(e.key === 'Delete' && caretOffset === textLen){
    e.preventDefault();
    mergeLinesInColumn(col, lineIdx);
  } else if(e.key === 'Backspace' && caretOffset === 0 && lineIdx > 0){
    e.preventDefault();
    mergeLinesInColumn(col, lineIdx-1);
  }
});

/* Multi-line text selection: each line is rendered as its own separate
   contenteditable div (see renderColumn), which browsers treat as an
   editing boundary during a native mouse drag -- dragging from one line
   into the next just gets clipped at that boundary, so only a single
   line's text could ever be selected. Handling the drag manually with the
   Selection API bypasses that per-element clipping, letting a drag span
   any number of lines within the same pane, same as a normal editor. */
(function setupMultiLineSelection(){
  let isSelecting = false;
  // The anchor is the fixed end of the selection (where a plain click
  // started it); it persists after mouseup so a later Shift+click can
  // extend the selection from that same point, like a normal text editor.
  let anchorNode = null, anchorOffset = 0, anchorCol = null;

  const editorWrapEl = document.getElementById('editor-wrap');

  function caretFromPoint(x, y){
    if(document.caretPositionFromPoint){
      const pos = document.caretPositionFromPoint(x, y);
      if(pos) return {node: pos.offsetNode, offset: pos.offset};
    }
    if(document.caretRangeFromPoint){
      const range = document.caretRangeFromPoint(x, y);
      if(range) return {node: range.startContainer, offset: range.startOffset};
    }
    return null;
  }

  function extendTo(x, y){
    const caret = caretFromPoint(x, y);
    if(!caret || !anchorNode) return;
    const sel = window.getSelection();
    if(!sel) return;
    try{
      sel.setBaseAndExtent(anchorNode, anchorOffset, caret.node, caret.offset);
    }catch(err){ /* point briefly resolved to an invalid range mid-drag; ignore */ }
  }

  function startSelecting(){
    isSelecting = true;
    editorWrapEl.classList.add('is-selecting');
  }

  editorWrapEl.addEventListener('mousedown', (e)=>{
    if(e.button !== 0) return; // left button only
    if(e.detail > 1) return; // let native double/triple-click word/line selection behave normally
    const contentEl = e.target.closest('.content[contenteditable="true"]');
    if(!contentEl || e.target.closest('.actbtn')) return;

    if(e.shiftKey && anchorNode && anchorCol === contentEl.dataset.col){
      // Shift+click: keep the existing anchor and just extend the
      // selection's other end to the click point, same as native
      // shift+click text selection.
      e.preventDefault();
      startSelecting();
      extendTo(e.clientX, e.clientY);
      return;
    }

    // Plain click: start a brand new selection anchored here. Suppress the
    // browser's own default mousedown selection handling and place the
    // (initially collapsed) caret ourselves -- if we let it run alongside
    // our mousemove-driven extension below, the two fight over the
    // selection during a drag (the native one keeps clipping back to a
    // single contenteditable line), which is what made a plain drag
    // intermittently only select one line.
    e.preventDefault();
    startSelecting();
    anchorCol = contentEl.dataset.col;
    const caret = caretFromPoint(e.clientX, e.clientY);
    anchorNode = caret ? caret.node : contentEl;
    anchorOffset = caret ? caret.offset : 0;
    contentEl.focus({preventScroll:true});
    const sel = window.getSelection();
    if(sel){
      try{ sel.setBaseAndExtent(anchorNode, anchorOffset, anchorNode, anchorOffset); }
      catch(err){ /* ignore */ }
    }
  });

  document.addEventListener('mousemove', (e)=>{
    if(!isSelecting || !anchorNode) return;
    const overEl = document.elementFromPoint(e.clientX, e.clientY);
    const contentEl = overEl && overEl.closest && overEl.closest('.content[contenteditable="true"]');
    // Only extend the selection while the drag stays within the same
    // pane/column -- crossing into another pane isn't a meaningful
    // selection here, so just leave the last valid selection as-is.
    if(!contentEl || contentEl.dataset.col !== anchorCol) return;
    extendTo(e.clientX, e.clientY);
  });

  document.addEventListener('mouseup', ()=>{
    isSelecting = false;
    editorWrapEl.classList.remove('is-selecting');
  });
})();

/* When a selection spans multiple lines, the DOM range can pass through
   sibling elements sitting between/after the .content divs -- namely each
   line's line-number cell and its merge/delete action buttons -- so a
   plain browser copy would include their glyphs in the clipboard text.
   Rebuild the copied text from just the .content elements' own text
   (respecting the exact partial-line boundaries of the selection) instead
   of trusting the browser's default serialization of the raw DOM range. */
function closestContentEl(node){
  if(!node) return null;
  const el = node.nodeType === 1 ? node : node.parentElement;
  return el ? el.closest('.content[contenteditable="true"]') : null;
}

document.getElementById('editor-wrap').addEventListener('copy', (e)=>{
  const sel = window.getSelection();
  if(!sel || sel.rangeCount === 0 || sel.isCollapsed) return; // nothing selected; let default copy happen
  const range = sel.getRangeAt(0);

  const startEl = closestContentEl(range.startContainer);
  const endEl = closestContentEl(range.endContainer);
  // Only take over for selections that live inside our editable lines and
  // stay within a single column; anything else falls back to the browser's
  // normal copy behavior untouched.
  if(!startEl || !endEl || startEl.dataset.col !== endEl.dataset.col) return;

  const col = startEl.dataset.col;
  const container = document.getElementById('lines-' + col);
  if(!container) return;
  const allContents = Array.from(container.querySelectorAll('.content[contenteditable="true"]'));
  const startIdx = allContents.indexOf(startEl);
  const endIdx = allContents.indexOf(endEl);
  if(startIdx === -1 || endIdx === -1) return;
  const lo = Math.min(startIdx, endIdx), hi = Math.max(startIdx, endIdx);

  const lines = [];
  for(let i = lo; i <= hi; i++){
    const el = allContents[i];
    const lineRange = document.createRange();
    // range.startContainer/endContainer are always in document order
    // (earlier point first) regardless of which direction the user
    // dragged, so no extra swapping is needed here.
    if(i === startIdx) lineRange.setStart(range.startContainer, range.startOffset);
    else lineRange.setStart(el, 0);
    if(i === endIdx) lineRange.setEnd(range.endContainer, range.endOffset);
    else lineRange.setEnd(el, el.childNodes.length);
    lines.push(lineRange.toString());
  }

  e.clipboardData.setData('text/plain', lines.join('\n'));
  e.preventDefault();
});

/* Click on gutter -> jump to proportional file position
   If click lands on a marker, jump to that diff block;
   otherwise jump to the proportional row in the file. */
function setupGutterClicks(){
  ['gutter-lm','gutter-mr'].forEach(gutterId=>{
    const gutterEl = document.getElementById(gutterId);
    if(!gutterEl) return;
    gutterEl.addEventListener('click', (e)=>{
      const gutterH = gutterEl.offsetHeight;
      const totalRows = state.rows.length;
      if(!gutterH || !totalRows) return;

      // y position relative to gutter top
      const rect = gutterEl.getBoundingClientRect();
      const y = e.clientY - rect.top;
      const ratio = Math.max(0, Math.min(1, y / gutterH));

      // Check if a marker was clicked -> jump to that diff block
      const marker = e.target.closest('.marker');
      if(marker){
        const startRow = parseInt(marker.dataset.blockStart, 10);
        const idx = state.diffBlocks.findIndex(b=> startRow>=b.start && startRow<=b.end);
        if(idx>=0){
          state.currentDiffIndex = idx;
          render();
          scrollToRow(startRow);
          updateDiffCounter();
          setStatus(`Jumped to diff ${idx+1} / ${state.diffBlocks.length}`);
          return;
        }
      }

      // Otherwise jump to proportional row
      const targetRow = Math.floor(ratio * totalRows);
      // Find nearest diff block to highlight
      let nearestIdx = -1;
      let nearestDist = Infinity;
      state.diffBlocks.forEach((b, i)=>{
        const dist = Math.min(Math.abs(b.start - targetRow), Math.abs(b.end - targetRow));
        if(dist < nearestDist){ nearestDist = dist; nearestIdx = i; }
      });
      if(nearestIdx >= 0) state.currentDiffIndex = nearestIdx;

      // Scroll all panes to proportional position
      const totalFileH = totalRows * LINE_H;
      const scrollEl = document.getElementById('scroll-left');
      const newScrollTop = Math.max(0, ratio * totalFileH - scrollEl.clientHeight / 2);
      const ids = state.mode==='3way'
        ? ['scroll-left','scroll-mid','scroll-right']
        : ['scroll-left','scroll-right'];
      ids.forEach(id=>{ document.getElementById(id).scrollTop = newScrollTop; });
      updateGutterViewport();
      render();
      updateDiffCounter();
      setStatus(`Jumped to ${Math.round(ratio*100)}% of file`);
    });
  });
}

/* Keyboard shortcuts: Ctrl+Z / Ctrl+Y while focused inside a pane */
document.addEventListener('keydown', (e)=>{
  if(!(e.ctrlKey || e.metaKey)) return;
  const active = document.activeElement;
  const colEl = active && active.closest('.pane');
  if(!colEl) return;
  let col = null;
  if(colEl.id==='pane-left') col='left';
  else if(colEl.id==='pane-mid') col='mid';
  else if(colEl.id==='pane-right') col='right';
  if(!col) return;
  if(e.key==='z' || e.key==='Z'){
    e.preventDefault();
    if(e.shiftKey) redo(col); else undo(col);
  } else if(e.key==='y' || e.key==='Y'){
    e.preventDefault();
    redo(col);
  }
});

/* ======================================================================
   Init
   ====================================================================== */
// Sync path inputs from initial state
syncPathInput('left');
syncPathInput('mid');
syncPathInput('right');
setupScrollSync();
setupGutterClicks();
setupAllDropZones();
recompute();
setStatus('Ready');

// Re-measure column widths and re-render gutters when window is resized
window.addEventListener('resize', ()=>{
  equalizeColumnWidths();
  rebuildColumnLayouts();
  renderGutters();
});
</script>
