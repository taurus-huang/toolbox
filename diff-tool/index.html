<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diff Tool</title>
<style>
  :root{
    --bg:#f0f1f4;
    --panel:#ffffff;
    --toolbar:#e4e6ea;
    --border:#c8cad0;
    --text:#1e1f22;
    --muted:#6b6e76;
    --accent:#2570c2;
    --line-num:#8a8d96;
    --diff-mod:#7a7a00;
    --diff-mod-border:#c8c800;
    --diff-add:#1a7a2a;
    --diff-add-border:#4caf50;
    --diff-del:#b02020;
    --diff-del-border:#f44336;
    --diff-mod-line:#fffde6;
    --diff-add-line:#e8f5e9;
    --diff-del-line:#ffebee;
    --btn-bg:#d8dae0;
    --btn-hover:#c8cad2;
    --gutter-bg:#e8eaee;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;font-family:"Segoe UI","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
  body{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

  /* Top toolbar */
  .toolbar{
    display:flex;align-items:center;gap:4px;
    background:var(--toolbar);border-bottom:1px solid var(--border);
    padding:6px 8px;flex-shrink:0;flex-wrap:wrap;
  }
  .toolbar .group{display:flex;gap:2px;align-items:center;padding:0 6px;border-right:1px solid var(--border);}
  .toolbar .group:last-child{border-right:none;}
  .tbtn{
    background:var(--btn-bg);border:1px solid var(--border);color:var(--text);
    padding:5px 10px;border-radius:4px;cursor:pointer;font-size:12px;
    display:flex;align-items:center;gap:5px;white-space:nowrap;
    transition:background .12s;
  }
  .tbtn:hover{background:var(--btn-hover);}
  .tbtn:active{background:var(--accent);}
  .tbtn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .tbtn:disabled{opacity:.4;cursor:default;}
  .tbtn .ico{font-size:14px;line-height:1;}

  /* Path bar */
  .pathbar{
    display:flex;flex-direction:column;
    background:var(--toolbar);border-bottom:1px solid var(--border);flex-shrink:0;
  }
  .pathrow{display:flex;align-items:center;}
  .pathrow .col-label{
    flex:1;display:flex;align-items:center;gap:4px;
    padding:4px 6px;border-right:1px solid var(--border);min-width:0;
  }
  .pathrow .col-label:last-child{border-right:none;}
  .pathrow input[type=text]{
    flex:1;background:#f8f9fb;border:1px solid var(--border);color:var(--text);
    padding:4px 6px;border-radius:3px;font-size:12px;min-width:0;
  }
  /* Read-only path row style: use gray background */
  .pathrow input[type=text][readonly]{
    background:#e1e3e6;
    cursor:text;
  }
  .pathrow .filebtns{display:flex;gap:2px;flex-shrink:0;}
  .pathrow .filebtns .tbtn{padding:4px 7px;}

  /* Main editor area */
  .editor-wrap{flex:1;display:flex;overflow:hidden;position:relative;}
  .pane{
    flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;background:var(--panel);
  }
  .pane-header{
    padding:4px 8px;background:var(--toolbar);border-bottom:1px solid var(--border);
    font-size:11px;color:var(--muted);flex-shrink:0;
  }
  .pane-scroll{
    flex:1;overflow-y:auto;overflow-x:auto;position:relative;font-family:Consolas,"Courier New",monospace;font-size:13px;line-height:20px;
  }
  .pane-scroll::-webkit-scrollbar{width:12px;height:12px;}
  .pane-scroll::-webkit-scrollbar-track{background:var(--panel);}
  .pane-scroll::-webkit-scrollbar-thumb{background:#b0b4bc;border-radius:6px;}
  .pane-scroll::-webkit-scrollbar-thumb:hover{background:#9096a0;}

  .line{
    display:flex;min-height:20px;position:relative;width:100%;
  }
  .line .num{
    width:46px;flex-shrink:0;text-align:right;padding-right:8px;color:var(--line-num);
    user-select:none;font-size:12px;line-height:20px;background:var(--gutter-bg);
    border-right:1px solid var(--border);
    position:sticky;left:0;z-index:4;
  }
  .line .content{
    flex:1;padding:0 8px;white-space:pre;outline:none;line-height:20px;min-height:20px;
    cursor:text;min-width:600px;
  }
  .line.empty .content{background:repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 4px, transparent 4px, transparent 8px);}
  .line.empty .num{color:transparent;}

  /* Gap marker: a thin line shown between two real lines to mark where
     content was added/deleted on the other side, without reserving a
     full blank numbered row. */
  .gap-line{
    display:flex;align-items:center;height:8px;position:relative;width:100%;
  }
  .gap-line .gap-num{width:46px;flex-shrink:0;border-right:1px solid var(--border);background:var(--gutter-bg);align-self:stretch;position:sticky;left:0;z-index:4;}
  .gap-line .gap-bar-wrap{flex:1;padding:0 8px;min-width:600px;}
  .gap-line .gap-bar{height:2px;border-radius:1px;}
  .gap-line.diff-add .gap-bar{background:var(--diff-add-border);}
  .gap-line.diff-del .gap-bar{background:var(--diff-del-border);}
  .gap-line.gap-current{box-shadow:inset 0 0 0 1px var(--accent);}
  .gap-line .actions{
    position:sticky;right:4px;margin-left:auto;height:18px;display:none;
    align-items:center;gap:3px;z-index:6;flex-shrink:0;
  }
  .gap-line:hover .actions{display:flex;}

  /* diff highlight backgrounds */
  .line.diff-mod{background:var(--diff-mod-line);}
  .line.diff-add{background:var(--diff-add-line);}
  .line.diff-del{background:var(--diff-del-line);}
  /* .line's own box is capped to the visible pane width, so when a long
     line is scrolled horizontally the row tint would stop short of the
     content actually in view. .content's box grows with the real
     (possibly overflowing) line width, so paint the tint there too. */
  .line.diff-mod .content{background:var(--diff-mod-line);}
  .line.diff-add .content{background:var(--diff-add-line);}
  .line.diff-del .content{background:var(--diff-del-line);}
  .line.diff-mod .num{background:var(--diff-mod-border);color:#fff;}
  .line.diff-add .num{background:var(--diff-add-border);color:#fff;}
  .line.diff-del .num{background:var(--diff-del-border);color:#fff;}
  .line.diff-current{box-shadow:inset 0 0 0 1px var(--accent);}

  /* Hover action icons (shown on the line, at right edge of content) */
  .line .actions{
    position:sticky;right:4px;margin-left:auto;height:20px;display:none;
    align-items:center;gap:3px;z-index:5;flex-shrink:0;
  }
  .line:hover .actions{display:flex;}
  .actbtn{
    width:18px;height:18px;border-radius:3px;background:#c8cad0;border:1px solid var(--border);
    color:#1e1f22;display:flex;align-items:center;justify-content:center;font-size:11px;
    cursor:pointer;line-height:1;padding:0;
  }
  .actbtn:hover{background:var(--accent);}

  /* Gutter (between panes) showing overview diff markers - fixed minimap */
  .gutter{
    width:30px;flex-shrink:0;background:var(--gutter-bg);border-left:1px solid var(--border);border-right:1px solid var(--border);
    position:relative;overflow:hidden;cursor:pointer;
  }
  /* gutter-track now fills the gutter exactly (no scroll transform) */
  .gutter-track{position:absolute;left:0;top:0;width:100%;height:100%;}
  .gutter .marker{
    position:absolute;left:4px;right:4px;border-radius:2px;cursor:pointer;opacity:.85;min-height:2px;
  }
  .gutter .marker.mod{background:var(--diff-mod-border);}
  .gutter .marker.add{background:var(--diff-add-border);}
  .gutter .marker.del{background:var(--diff-del-border);}
  .gutter .marker:hover{opacity:1;outline:1px solid #333;}
  /* viewport indicator */
  .gutter .viewport-indicator{
    position:absolute;left:0;right:0;background:rgba(37,112,194,0.12);
    border-top:1px solid rgba(37,112,194,0.4);border-bottom:1px solid rgba(37,112,194,0.4);
    pointer-events:none;
  }

  /* status bar */
  .statusbar{
    padding:4px 10px;background:var(--toolbar);border-top:1px solid var(--border);
    font-size:11px;color:var(--muted);display:flex;justify-content:space-between;flex-shrink:0;
  }
  .legend{display:flex;gap:14px;align-items:center;}
  .legend span{display:flex;align-items:center;gap:5px;}
  .legend .swatch{width:12px;height:12px;border-radius:2px;display:inline-block;}
  .swatch.mod{background:var(--diff-mod-border);}
  .swatch.add{background:var(--diff-add-border);}
  .swatch.del{background:var(--diff-del-border);}

  .hidden{display:none !important;}

  /* Drag & drop file loading */
  .col-label.drag-over{
    outline:2px dashed var(--accent);
    outline-offset:-2px;
    background:rgba(37,112,194,0.10);
  }
  .pane{position:relative;}
  .pane.drag-over::after{
    content:"📂 Drop file to load";
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(37,112,194,0.10);
    border:2px dashed var(--accent);
    color:var(--accent);
    font-size:16px;
    font-weight:600;
    pointer-events:none;
    z-index:50;
  }

  /* Intra-line character diff highlight */
  .line.diff-mod .char-diff{
    background:rgba(180,140,0,0.35);
    border-radius:2px;
    outline:1px solid rgba(180,130,0,0.5);
  }
  .line.diff-add .char-diff{
    background:rgba(50,160,70,0.35);
    border-radius:2px;
    outline:1px solid rgba(50,160,70,0.5);
  }
  .line.diff-del .char-diff{
    background:rgba(200,50,50,0.35);
    border-radius:2px;
    outline:1px solid rgba(200,50,50,0.5);
  }
</style>
</head>
<body>

<!-- ============ TOP TOOLBAR ============ -->
<div class="toolbar">
  <div class="group">
    <button class="tbtn active" id="btn-2way" title="2-way compare">2️⃣ 2-way</button>
    <button class="tbtn" id="btn-3way" title="3-way compare">3️⃣ 3-way</button>
  </div>
  <div class="group">
    <button class="tbtn" id="nav-first" title="First difference">⏫ First</button>
    <button class="tbtn" id="nav-prev" title="Previous difference">🔼 Prev</button>
    <button class="tbtn" id="nav-next" title="Next difference">🔽 Next</button>
    <button class="tbtn" id="nav-last" title="Last difference">⏬ Last</button>
  </div>
  <div class="group">
    <span id="diff-counter" style="color:var(--muted);font-size:12px;">Diff: 0 / 0</span>
  </div>
  <div class="group">
    <button class="tbtn" id="btn-recompute" title="Re-run diff">🔄 Re-diff</button>
  </div>
</div>

<!-- ============ PATH BAR ============ -->
<div class="pathbar" id="pathbar">
  <div class="pathrow">
    <div class="col-label">
      <input type="text" id="path-left" placeholder="Left file path..." readonly>
      <div class="filebtns">
        <button class="tbtn" data-act="undo" data-col="left" title="Undo">↩️</button>
        <button class="tbtn" data-act="redo" data-col="left" title="Redo">↪️</button>
        <button class="tbtn" data-act="refresh" data-col="left" title="Refresh">🔄</button>
        <button class="tbtn" data-act="open" data-col="left" title="Open">📂</button>
        <button class="tbtn" data-act="save" data-col="left" title="Save">💾</button>
      </div>
    </div>
    <div class="col-label" id="pathcol-mid">
      <input type="text" id="path-mid" placeholder="Middle file path..." readonly>
      <div class="filebtns">
        <button class="tbtn" data-act="undo" data-col="mid" title="Undo">↩️</button>
        <button class="tbtn" data-act="redo" data-col="mid" title="Redo">↪️</button>
        <button class="tbtn" data-act="refresh" data-col="mid" title="Refresh">🔄</button>
        <button class="tbtn" data-act="open" data-col="mid" title="Open">📂</button>
        <button class="tbtn" data-act="save" data-col="mid" title="Save">💾</button>
      </div>
    </div>
    <div class="col-label">
      <input type="text" id="path-right" placeholder="Right file path..." readonly>
      <div class="filebtns">
        <button class="tbtn" data-act="undo" data-col="right" title="Undo">↩️</button>
        <button class="tbtn" data-act="redo" data-col="right" title="Redo">↪️</button>
        <button class="tbtn" data-act="refresh" data-col="right" title="Refresh">🔄</button>
        <button class="tbtn" data-act="open" data-col="right" title="Open">📂</button>
        <button class="tbtn" data-act="save" data-col="right" title="Save">💾</button>
      </div>
    </div>
  </div>
</div>
<input type="file" id="file-input" class="hidden">

<!-- ============ EDITOR AREA ============ -->
<div class="editor-wrap" id="editor-wrap">
  <div class="pane" id="pane-left">
    <div class="pane-scroll" id="scroll-left"><div id="lines-left"></div></div>
  </div>
  <div class="gutter" id="gutter-lm"><div class="gutter-track" id="gutter-lm-track"></div></div>
  <div class="pane" id="pane-mid">
    <div class="pane-scroll" id="scroll-mid"><div id="lines-mid"></div></div>
  </div>
  <div class="gutter" id="gutter-mr"><div class="gutter-track" id="gutter-mr-track"></div></div>
  <div class="pane" id="pane-right">
    <div class="pane-scroll" id="scroll-right"><div id="lines-right"></div></div>
  </div>
</div>

<!-- ============ STATUS BAR ============ -->
<div class="statusbar">
  <div class="legend">
    <span><span class="swatch mod"></span> Modified</span>
    <span><span class="swatch add"></span> Added</span>
    <span><span class="swatch del"></span> Deleted</span>
  </div>
  <div id="status-text">Ready</div>
</div>

<script>
/* ======================================================================
   Diff Tool
   ====================================================================== */

const LINE_H = 20; // px, must match CSS .line min-height
const GAP_H = 8; // px, must match CSS .gap-line height

/* ---------- State ---------- */

const state = {
  mode: '2way', // '2way' or '3way'
  cols: {
    left:  { text: '',  lines: [], history: [], future: [], userLoaded: false, fullPath: '', handle: null },
    mid:   { text: '',   lines: [], history: [], future: [], userLoaded: false, fullPath: '', handle: null },
    right: { text: '', lines: [], history: [], future: [], userLoaded: false, fullPath: '', handle: null },
  },
  // diff alignment rows: each row = {left:{type,lineIdx}|null, mid:.., right:..}
  rows: [],
  diffBlocks: [], // list of {start, end, types:{left,mid,right}} - groups of consecutive non-equal rows
  currentDiffIndex: -1,
};

function splitLines(text){
  if(text === '') return [''];
  // Split on both Windows (\r\n) and Unix (\n) line endings
  return text.split(/\r?\n/);
}

/* ======================================================================
   Diff algorithm: simple LCS-based line diff for two arrays
   ====================================================================== */
function diffLines(a, b) {
  const n = a.length, m = b.length;
  // LCS dp table
  const dp = Array.from({length:n+1},()=>new Int32Array(m+1));
  for(let i=n-1;i>=0;i--){
    for(let j=m-1;j>=0;j--){
      if(a[i]===b[j]) dp[i][j] = dp[i+1][j+1]+1;
      else dp[i][j] = Math.max(dp[i+1][j], dp[i][j+1]);
    }
  }
  // build alignment: array of {a:idx|null, b:idx|null, eq:bool}
  const result = [];
  let i=0,j=0;
  while(i<n && j<m){
    if(a[i]===b[j]){ result.push({a:i,b:j,eq:true}); i++; j++; }
    else if(dp[i+1][j] >= dp[i][j+1]){ result.push({a:i,b:null,eq:false}); i++; }
    else { result.push({a:null,b:j,eq:false}); j++; }
  }
  while(i<n){ result.push({a:i,b:null,eq:false}); i++; }
  while(j<m){ result.push({a:null,b:j,eq:false}); j++; }

  // Post-process: merge adjacent del+add pairs into "mod" pairs for nicer alignment
  const merged = [];
  for(let k=0;k<result.length;k++){
    const cur = result[k];
    if(!cur.eq && cur.a!==null && cur.b===null){
      // look ahead for a run of adds that could pair
      // find consecutive del block
      let delStart=k;
      while(k<result.length && !result[k].eq && result[k].a!==null && result[k].b===null) k++;
      const delBlock = result.slice(delStart,k);
      // consecutive add block right after
      let addStart=k;
      while(k<result.length && !result[k].eq && result[k].a===null && result[k].b!==null) k++;
      const addBlock = result.slice(addStart,k);
      k--; // adjust outer loop increment
      const len = Math.max(delBlock.length, addBlock.length);
      for(let x=0;x<len;x++){
        const da = x<delBlock.length ? delBlock[x].a : null;
        const bb = x<addBlock.length ? addBlock[x].b : null;
        merged.push({a:da, b:bb, eq:false});
      }
    } else {
      merged.push(cur);
    }
  }
  return merged;
}

/* For 3-way: align left vs mid vs right using mid as the pivot/base.
   We compute diff(left,mid) and diff(mid,right), then merge alignments
   based on mid index. */
function buildRows3(leftLines, midLines, rightLines){
  const dLM = diffLines(leftLines, midLines); // {a:leftIdx, b:midIdx}
  const dMR = diffLines(midLines, rightLines); // {a:midIdx, b:rightIdx}

  // index dMR by mid index for quick lookup, also handle mid==null entries (pure right-adds)
  // We'll walk through both alignments in lockstep keyed on "mid index progression"
  const rows = [];
  let p1=0, p2=0;
  while(p1 < dLM.length || p2 < dMR.length){
    const e1 = p1 < dLM.length ? dLM[p1] : null;
    const e2 = p2 < dMR.length ? dMR[p2] : null;

    const midA = e1 ? e1.b : null; // mid index per left-alignment
    const midB = e2 ? e2.a : null; // mid index per right-alignment

    if(e1 && midA===null && (e2===null || midB!==null)){
      // left has a row with no mid counterpart (pure left line, deletion relative to mid)
      rows.push({left:{idx:e1.a}, mid:null, right:null});
      p1++;
      continue;
    }
    if(e2 && midB===null && (e1===null || midA!==null)){
      // right has a row with no mid counterpart (pure right addition)
      rows.push({left:null, mid:null, right:{idx:e2.b}});
      p2++;
      continue;
    }
    if(e1 && e2 && midA!==null && midB!==null && midA===midB){
      rows.push({
        left: e1.a!==null ? {idx:e1.a} : null,
        mid: {idx: midA},
        right: e2.b!==null ? {idx:e2.b} : null
      });
      p1++; p2++;
      continue;
    }
    // fallback / mismatch - advance whichever has null mid first
    if(e1 && midA===null){ rows.push({left:{idx:e1.a}, mid:null, right:null}); p1++; continue; }
    if(e2 && midB===null){ rows.push({left:null, mid:null, right:{idx:e2.b}}); p2++; continue; }
    // both point to mid but mismatched indices - advance smaller
    if(e1 && e2){
      if(midA <= midB){ rows.push({left: e1.a!==null?{idx:e1.a}:null, mid:{idx:midA}, right:null}); p1++; }
      else { rows.push({left:null, mid:{idx:midB}, right: e2.b!==null?{idx:e2.b}:null}); p2++; }
      continue;
    }
    if(e1){ rows.push({left: e1.a!==null?{idx:e1.a}:null, mid: midA!==null?{idx:midA}:null, right:null}); p1++; continue; }
    if(e2){ rows.push({left:null, mid: midB!==null?{idx:midB}:null, right: e2.b!==null?{idx:e2.b}:null}); p2++; continue; }
    break;
  }
  return rows;
}

function buildRows2(leftLines, rightLines){
  const d = diffLines(leftLines, rightLines);
  return d.map(e=>({
    left: e.a!==null ? {idx:e.a} : null,
    mid: null,
    right: e.b!==null ? {idx:e.b} : null
  }));
}

/* Determine the "status" of a row for each column: 'equal','mod','add','del' */
function classifyRow(row, mode){
  const hasL = row.left!==null;
  const hasM = row.mid!==null;
  const hasR = row.right!==null;

  if(mode==='3way'){
    // If mid column is entirely absent (userLoaded=false / empty), treat as 2-way diff
    // between left and right, mid shown as neutral empty
    const midEmpty = !state.cols.mid.userLoaded || state.cols.mid.text.trim() === '';
    if(midEmpty){
      // classify only left vs right, mid stays neutral
      if(hasL && hasR){
        const lt = state.cols.left.lines[row.left.idx];
        const rt = state.cols.right.lines[row.right.idx];
        if(lt===rt) return {left:'equal', mid:'equal', right:'equal'};
        return {left:'mod', mid:'equal', right:'mod', anyDiff:true};
      }
      if(hasL && !hasR) return {left:'del', mid:'equal', right:'del', anyDiff:true};
      if(!hasL && hasR) return {left:'add', mid:'equal', right:'add', anyDiff:true};
      return {left:'equal', mid:'equal', right:'equal'};
    }

    const presentCount = (hasL?1:0)+(hasM?1:0)+(hasR?1:0);
    if(presentCount===3){
      const lt = state.cols.left.lines[row.left.idx];
      const mt = state.cols.mid.lines[row.mid.idx];
      const rt = state.cols.right.lines[row.right.idx];
      if(lt===mt && mt===rt) return {left:'equal',mid:'equal',right:'equal'};
      return {left: lt===mt?'equal':'mod', mid:'mod', right: rt===mt?'equal':'mod', anyDiff:true};
    }
    // Partial presence: mid is the base. Compare left/right against mid,
    // and treat "missing" columns as add/del relative to the base.
    if(hasM && hasL && !hasR){
      // Right removed this base line; compare left against the base
      const mt = state.cols.mid.lines[row.mid.idx];
      const lt = state.cols.left.lines[row.left.idx];
      const leftEqual = lt===mt;
      // If left matches the base exactly, the only real change here is
      // right's deletion, so mark mid as deleted (red) too, not modified.
      return {left: leftEqual ? 'equal' : 'mod', mid: leftEqual ? 'del' : 'mod', right:'del', anyDiff:true};
    }
    if(hasM && hasR && !hasL){
      // Left removed this base line; compare right against the base
      const mt = state.cols.mid.lines[row.mid.idx];
      const rt = state.cols.right.lines[row.right.idx];
      const rightEqual = rt===mt;
      return {left:'del', mid: rightEqual ? 'del' : 'mod', right: rightEqual ? 'equal' : 'mod', anyDiff:true};
    }
    if(hasM && !hasL && !hasR){
      // Base line was independently removed from both left and right
      return {left:'del', mid:'del', right:'del', anyDiff:true};
    }
    if(hasL && !hasM && !hasR){
      // Line only exists in left: newly added in left relative to the base.
      // Right is equally absent here (same as mid), so it gets no marker.
      return {left:'add', mid:'add', right:'equal', anyDiff:true};
    }
    if(hasR && !hasM && !hasL){
      // Line only exists in right: newly added in right relative to the base.
      // Left is equally absent here (same as mid), so it gets no marker.
      return {left:'equal', mid:'add', right:'add', anyDiff:true};
    }
    // Fallback for any unexpected combination (should not normally occur)
    const res = {left:'equal',mid:'equal',right:'equal',anyDiff:true};
    res.left = hasL ? 'mod' : 'del';
    res.mid  = hasM ? 'mod' : 'del';
    res.right= hasR ? 'mod' : 'del';
    return res;
  } else {
    if(hasL && hasR){
      const lt = state.cols.left.lines[row.left.idx];
      const rt = state.cols.right.lines[row.right.idx];
      if(lt===rt) return {left:'equal',right:'equal'};
      return {left:'mod', right:'mod', anyDiff:true};
    }
    if(hasL && !hasR) return {left:'del', right:'del', anyDiff:true};
    if(!hasL && hasR) return {left:'add', right:'add', anyDiff:true};
    return {left:'equal',right:'equal'};
  }
}

/* Build diff blocks: consecutive rows where anyDiff is true, grouped */
function buildDiffBlocks(){
  const blocks = [];
  let cur = null;
  for(let i=0;i<state.rows.length;i++){
    const row = state.rows[i];
    const cls = classifyRow(row, state.mode);
    row._cls = cls;
    if(cls.anyDiff){
      if(!cur) cur = {start:i, end:i};
      else cur.end = i;
    } else {
      if(cur){ blocks.push(cur); cur=null; }
    }
  }
  if(cur) blocks.push(cur);
  state.diffBlocks = blocks;
}

/* Determine the diff relationship between two specific columns for one row,
   independent of the mid-centric classifyRow status. Used so each gutter
   only reacts to real differences between the exact pair of columns it shows. */
function pairDiffType(row, colA, colB){
  if(colA==='mid' || colB==='mid'){
    const midEmpty = !state.cols.mid.userLoaded || state.cols.mid.text.trim() === '';
    if(midEmpty) return 'equal';
  }
  const a = row[colA], b = row[colB];
  const hasA = a !== null, hasB = b !== null;
  if(hasA && hasB){
    const ta = state.cols[colA].lines[a.idx];
    const tb = state.cols[colB].lines[b.idx];
    return ta===tb ? 'equal' : 'mod';
  }
  if(hasA && !hasB) return 'del';
  if(!hasA && hasB) return 'add';
  return 'equal';
}

/* Group consecutive rows where colA/colB actually differ into blocks,
   so gutter markers only appear where that specific pair has a real diff. */
function buildPairBlocks(colA, colB){
  const blocks = [];
  let cur = null;
  for(let i=0;i<state.rows.length;i++){
    const t = pairDiffType(state.rows[i], colA, colB);
    if(t !== 'equal'){
      if(cur && cur.type===t){
        cur.end = i;
      } else {
        if(cur) blocks.push(cur);
        cur = {start:i, end:i, type:t};
      }
    } else if(cur){
      blocks.push(cur); cur=null;
    }
  }
  if(cur) blocks.push(cur);
  return blocks;
}

/* ======================================================================
   Rendering
   ====================================================================== */

function recompute(opts){
  const keepView = !!(opts && opts.keepView);
  let savedScroll = null;
  if(keepView){
    savedScroll = {};
    ['scroll-left','scroll-mid','scroll-right'].forEach(id=>{
      const el = document.getElementById(id);
      if(el) savedScroll[id] = { top: el.scrollTop, left: el.scrollLeft };
    });
  }

  state.cols.left.lines = splitLines(state.cols.left.text);
  state.cols.mid.lines = splitLines(state.cols.mid.text);
  state.cols.right.lines = splitLines(state.cols.right.text);

  if(state.mode==='3way'){
    const midEmpty = !state.cols.mid.userLoaded || state.cols.mid.text.trim() === '';
    if(midEmpty){
      // Use left<->right diff, but keep mid column null (shown as empty pane)
      const rows2 = buildRows2(state.cols.left.lines, state.cols.right.lines);
      state.rows = rows2; // mid is already null in each row from buildRows2
    } else {
      state.rows = buildRows3(state.cols.left.lines, state.cols.mid.lines, state.cols.right.lines);
    }
  } else {
    state.rows = buildRows2(state.cols.left.lines, state.cols.right.lines);
  }
  buildDiffBlocks();
  state.currentDiffIndex = state.diffBlocks.length ? 0 : -1;
  render();
  updateDiffCounter();

  if(keepView && savedScroll){
    // Stay where the user was instead of jumping to the first diff
    Object.keys(savedScroll).forEach(id=>{
      const el = document.getElementById(id);
      if(el){
        el.scrollTop = savedScroll[id].top;
        el.scrollLeft = savedScroll[id].left;
      }
    });
    updateGutterViewport();
  } else if(state.diffBlocks.length){
    // If there are diffs, scroll to the first diff by default
    scrollToRow(state.diffBlocks[0].start);
  }
}

function escapeHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function lineHtml(text){
  return escapeHtml(text);
}

/* Character-level LCS diff between two strings.
   Returns array of {type:'eq'|'del'|'ins', text} segments.
   'del' = chars only in a (left), 'ins' = chars only in b (right). */
function diffChars(a, b){
  const n = a.length, m = b.length;
  if(n * m > 200000) return null; // too long, skip intra-line diff
  const dp = Array.from({length:n+1}, ()=>new Int32Array(m+1));
  for(let i=n-1;i>=0;i--){
    for(let j=m-1;j>=0;j--){
      dp[i][j] = a[i]===b[j] ? dp[i+1][j+1]+1 : Math.max(dp[i+1][j], dp[i][j+1]);
    }
  }
  const segs = [];
  let i=0, j=0;
  while(i<n || j<m){
    if(i<n && j<m && a[i]===b[j]){ segs.push({type:'eq',text:a[i]}); i++; j++; }
    else if(j<m && (i>=n || dp[i][j+1] >= (i<n ? dp[i+1][j] : 0))){ segs.push({type:'ins',text:b[j]}); j++; }
    else { segs.push({type:'del',text:a[i]}); i++; }
  }
  // merge consecutive same-type
  const merged = [];
  for(const s of segs){
    if(merged.length && merged[merged.length-1].type===s.type) merged[merged.length-1].text+=s.text;
    else merged.push({type:s.type, text:s.text});
  }
  return merged;
}

/* Produce HTML for a 'mod' line, highlighting intra-line differences.
   side='del': this is the left/old text; highlight deleted chars.
   side='ins': this is the right/new text; highlight inserted chars. */
function lineHtmlWithDiff(text, otherText, side){
  const segs = diffChars(side==='del' ? text : otherText,
                          side==='del' ? otherText : text);
  if(!segs) return escapeHtml(text);
  let html = '';
  for(const s of segs){
    const esc = escapeHtml(s.text);
    if(s.type==='eq'){ html += esc; }
    else if(s.type===(side==='del' ? 'del' : 'ins')){ html += `<span class="char-diff">${esc}</span>`; }
    // skip chars belonging to the other side
  }
  return html;
}

function buildActionButtons(rowIdx, col, hasLeftPane, hasRightPane){
  // col: 'left' | 'mid' | 'right'
  let html = '<div class="actions">';
  if(hasLeftPane){
    html += `<button class="actbtn" data-action="copy-left" data-row="${rowIdx}" data-col="${col}" title="Merge to left">⬅️</button>`;
  }
  if(hasRightPane){
    html += `<button class="actbtn" data-action="copy-right" data-row="${rowIdx}" data-col="${col}" title="Merge to right">➡️</button>`;
  }
  html += `<button class="actbtn" data-action="delete-block" data-row="${rowIdx}" data-col="${col}" title="Delete this diff block">❌</button>`;
  html += '</div>';
  return html;
}

function render(){
  const mode = state.mode;
  document.getElementById('pane-mid').classList.toggle('hidden', mode!=='3way');
  document.getElementById('pathcol-mid').classList.toggle('hidden', mode!=='3way');
  document.getElementById('gutter-lm').classList.toggle('hidden', false);
  document.getElementById('gutter-mr').classList.toggle('hidden', mode!=='3way');
  // when 2way, gutter-lm acts as the single left<->right gutter
  document.getElementById('gutter-lm-track').dataset.pair = mode==='3way' ? 'lm' : 'lr';

  renderColumn('left');
  if(mode==='3way') renderColumn('mid');
  renderColumn('right');
  equalizeColumnWidths();
  rebuildColumnLayouts();
  renderGutters();
}

/* Rows only need to be as wide as their own text (min 600px), so a short
   line's diff background would otherwise stop short of the real scroll
   extent whenever some other line in the file is longer. Force every
   column's row container to the widest line's natural width so each row
   (via width:100% on .line/.gap-line) stretches its highlight that far too. */
function equalizeColumnWidths(){
  const cols = state.mode==='3way' ? ['left','mid','right'] : ['left','right'];
  cols.forEach(col=>{
    const container = document.getElementById('lines-' + col);
    if(!container) return;
    container.style.width = ''; // clear any previously forced width before measuring
    const w = container.scrollWidth;
    container.style.width = w + 'px';
  });
}

/* Each column can now have a different real rendered height, since
   consecutive add/del gaps collapse into a single thin marker instead of
   one blank row per skipped line. These layouts let us translate a row
   index into that column's actual pixel offset (and back), so scrolling
   can keep the same diff position aligned across panes despite the
   differing heights. */
function computeColumnLayout(col){
  const n = state.rows.length;
  const offsets = new Array(n);
  let y = 0, i = 0;
  while(i < n){
    const cell = state.rows[i][col];
    if(cell){
      offsets[i] = y;
      y += LINE_H;
      i++;
    } else {
      const gapTop = y;
      while(i < n && !state.rows[i][col]){
        offsets[i] = gapTop;
        i++;
      }
      y += GAP_H;
    }
  }
  return { offsets, totalHeight: y };
}

function rebuildColumnLayouts(){
  state.colLayout = {
    left: computeColumnLayout('left'),
    mid: computeColumnLayout('mid'),
    right: computeColumnLayout('right'),
  };
}

function offsetForRow(col, rowIdx){
  const layout = state.colLayout && state.colLayout[col];
  if(!layout || !layout.offsets.length) return 0;
  const idx = Math.max(0, Math.min(rowIdx, layout.offsets.length-1));
  return layout.offsets[idx];
}

/* Find the row whose top offset in this column is at or just before y
   (binary search, since offsets are non-decreasing). */
function rowAtOffset(col, y){
  const layout = state.colLayout && state.colLayout[col];
  if(!layout || !layout.offsets.length) return 0;
  const offsets = layout.offsets;
  let lo=0, hi=offsets.length-1, ans=0;
  while(lo<=hi){
    const mid=(lo+hi)>>1;
    if(offsets[mid] <= y){ ans=mid; lo=mid+1; } else { hi=mid-1; }
  }
  return ans;
}

function renderColumn(col){
  const container = document.getElementById('lines-' + col);
  const colData = state.cols[col];
  const mode = state.mode;
  let html = '';
  const hasLeftPane = (col!=='left'); // is there a pane to the left of this one
  const hasRightPane = (col!=='right'); // is there a pane to the right of this one

  // Consecutive gap rows (add/del) for this column collapse into a single
  // thin marker line rendered between the two real lines that surround them,
  // instead of one blank numbered row per gap.
  let pendingGap = null; // {type:'add'|'del', current:boolean, rowIdx:number, leftHasContent:boolean, rightHasContent:boolean}
  const flushGap = () => {
    if(!pendingGap) return;
    const typeCls = pendingGap.type==='add' ? 'diff-add' : 'diff-del';
    const curCls = pendingGap.current ? ' gap-current' : '';
    const label = pendingGap.type==='add' ? 'Content added here' : 'Content deleted here';
    let effHasLeftPane = hasLeftPane;
    let effHasRightPane = hasRightPane;
    if(col==='mid'){
      // Mid has no content here. If left is equally absent, there's nothing
      // to merge to/from left; same logic for right.
      if(!pendingGap.leftHasContent) effHasLeftPane = false;
      if(!pendingGap.rightHasContent) effHasRightPane = false;
    }
    const actionsHtml = buildActionButtons(pendingGap.rowIdx, col, effHasLeftPane, effHasRightPane);
    html += `<div class="gap-line ${typeCls}${curCls}" title="${label}">`
          + `<div class="gap-num"></div>`
          + `<div class="gap-bar-wrap"><div class="gap-bar"></div></div>`
          + actionsHtml
          + `</div>`;
    pendingGap = null;
  };

  for(let i=0;i<state.rows.length;i++){
    const row = state.rows[i];
    const cell = row[col];
    const cls = row._cls;
    const status = cls ? cls[col] : 'equal';
    const isCurrent = (i===state.diffBlocks[state.currentDiffIndex]?.start);

    if(!cell){
      // Gap row: accumulate into the pending marker instead of rendering a blank line
      if(status==='add' || status==='del'){
        if(!pendingGap) pendingGap = {type:status, current:false, rowIdx:i, leftHasContent:false, rightHasContent:false};
        else pendingGap.type = status;
        if(isCurrent) pendingGap.current = true;
        if(row.left) pendingGap.leftHasContent = true;
        if(row.right) pendingGap.rightHasContent = true;
      }
      continue;
    }

    // Real line present: flush any pending gap marker right before it
    flushGap();

    let lineClasses = 'line';
    let lineNum = '';
    let content = '';
    let editable = 'false';
    let actionsHtml = '';

    lineNum = (cell.idx+1).toString();
    editable = 'true';
    if(status==='mod'){
      lineClasses += ' diff-mod';
      // find the paired column for intra-line char diff
      let otherCol = null;
      if(col==='left') otherCol = mode==='3way' ? 'mid' : 'right';
      else if(col==='right') otherCol = mode==='3way' ? 'mid' : 'left';
      else if(col==='mid'){
        // Mid is the base: compare against whichever side actually differs from it
        const midText = colData.lines[cell.idx];
        const rightCell = row.right, leftCell = row.left;
        const rightText = rightCell ? state.cols.right.lines[rightCell.idx] : undefined;
        const leftText = leftCell ? state.cols.left.lines[leftCell.idx] : undefined;
        if(rightText !== undefined && rightText !== midText) otherCol = 'right';
        else if(leftText !== undefined && leftText !== midText) otherCol = 'left';
        else otherCol = 'right';
      }
      const otherCell = otherCol ? row[otherCol] : null;
      if(otherCell && state.cols[otherCol].lines[otherCell.idx] !== undefined){
        const otherText = state.cols[otherCol].lines[otherCell.idx];
        const side = (col==='left' || (col==='mid' && otherCol==='right')) ? 'del' : 'ins';
        content = lineHtmlWithDiff(colData.lines[cell.idx], otherText, side);
      } else {
        content = lineHtml(colData.lines[cell.idx]);
      }
    } else {
      content = lineHtml(colData.lines[cell.idx]);
      if(status==='add') lineClasses += ' diff-add';
      else if(status==='del') lineClasses += ' diff-del';
    }

    if(isCurrent){
      lineClasses += ' diff-current';
    }

    if(cls && cls.anyDiff){
      let effHasLeftPane = hasLeftPane;
      let effHasRightPane = hasRightPane;
      if(col==='mid'){
        if(cls.left==='equal') effHasLeftPane = false;
        if(cls.right==='equal') effHasRightPane = false;
      }
      actionsHtml = buildActionButtons(i, col, effHasLeftPane, effHasRightPane);
    }

    html += `<div class="${lineClasses}" data-row="${i}" data-col="${col}">`
          + `<div class="num">${lineNum}</div>`
          + `<div class="content" contenteditable="${editable}" spellcheck="false" data-row="${i}" data-col="${col}">${content}</div>`
          + actionsHtml
          + `</div>`;
  }
  // Trailing gap at the very end of the file (e.g. deleted/added last lines)
  flushGap();
  container.innerHTML = html;
}

/* Render the gutter markers between panes, showing whole-file diff overview */
function renderGutters(){
  if(state.mode==='3way'){
    // Mid is the base; left is the modified copy being compared against it.
    renderOneGutter('gutter-lm-track', 'mid', 'left');
    renderOneGutter('gutter-mr-track', 'mid', 'right');
  } else {
    renderOneGutter('gutter-lm-track', 'left', 'right');
  }
  updateGutterViewport();
}

function renderOneGutter(trackId, colA, colB){
  const track = document.getElementById(trackId);
  const totalRows = state.rows.length;
  const totalFileH = Math.max(totalRows * LINE_H, 1);
  // gutterH will be measured at paint time; use offsetHeight of gutter element
  const gutterEl = track.parentElement;
  const gutterH = gutterEl.offsetHeight || 400;

  let html = '';
  const blocks = buildPairBlocks(colA, colB);
  for(const block of blocks){
    // Map file row position -> gutter pixel (proportional)
    const topRatio    = (block.start * LINE_H) / totalFileH;
    const bottomRatio = ((block.end + 1) * LINE_H) / totalFileH;
    const top    = topRatio * gutterH;
    const height = Math.max(2, (bottomRatio - topRatio) * gutterH);

    html += `<div class="marker ${block.type}" style="top:${top.toFixed(1)}px;height:${height.toFixed(1)}px" data-block-start="${block.start}" title="Jump to this diff"></div>`;
  }
  // viewport indicator placeholder (updated by updateGutterViewport)
  html += `<div class="viewport-indicator" id="${trackId}-vp"></div>`;
  track.innerHTML = html;
}

/* Update the viewport indicator rectangle on all visible gutters */
function updateGutterViewport(){
  const scrollEl = document.getElementById('scroll-left');
  const totalRows = state.rows.length;
  const totalFileH = Math.max(totalRows * LINE_H, 1);
  const scrollTop  = scrollEl.scrollTop;
  const viewH      = scrollEl.clientHeight;

  ['gutter-lm-track','gutter-mr-track'].forEach(trackId=>{
    const vp = document.getElementById(trackId+'-vp');
    if(!vp) return;
    const gutterEl = document.getElementById(trackId).parentElement;
    const gutterH  = gutterEl.offsetHeight || 400;
    const top    = (scrollTop / totalFileH) * gutterH;
    const height = Math.max(4, (viewH / totalFileH) * gutterH);
    vp.style.top    = top.toFixed(1) + 'px';
    vp.style.height = height.toFixed(1) + 'px';
  });
}

/* ======================================================================
   Navigation
   ====================================================================== */

function updateDiffCounter(){
  const total = state.diffBlocks.length;
  const cur = total ? state.currentDiffIndex + 1 : 0;
  document.getElementById('diff-counter').textContent = `Diff: ${cur} / ${total}`;
}

function scrollToRow(rowIdx){
  const scrollers = state.mode==='3way'
    ? [['scroll-left','left'],['scroll-mid','mid'],['scroll-right','right']]
    : [['scroll-left','left'],['scroll-right','right']];
  for(const [id,col] of scrollers){
    const el = document.getElementById(id);
    const targetTop = offsetForRow(col, rowIdx);
    const center = targetTop - el.clientHeight/2 + LINE_H/2;
    el.scrollTop = Math.max(0, center);
  }
}

function goToDiff(target){
  const n = state.diffBlocks.length;
  if(n===0) return;
  if(target==='first') state.currentDiffIndex = 0;
  else if(target==='last') state.currentDiffIndex = n-1;
  else if(target==='next') state.currentDiffIndex = Math.min(n-1, state.currentDiffIndex+1);
  else if(target==='prev') state.currentDiffIndex = Math.max(0, state.currentDiffIndex-1);

  const block = state.diffBlocks[state.currentDiffIndex];
  render();
  scrollToRow(block.start);
  updateDiffCounter();
  setStatus(`Jumped to diff ${state.currentDiffIndex+1} / ${n}`);
}

/* ======================================================================
   Merge / Delete actions
   ====================================================================== */

function findBlockForRow(rowIdx){
  for(const b of state.diffBlocks){
    if(rowIdx>=b.start && rowIdx<=b.end) return b;
  }
  return {start:rowIdx, end:rowIdx};
}

function pushHistory(col){
  const c = state.cols[col];
  c.history.push(c.text);
  if(c.history.length>200) c.history.shift();
  c.future = [];
}

/* Get the text-lines for a block range for a given column, as an array of strings
   (skipping null cells). */
function getBlockLines(block, col){
  const lines = [];
  for(let i=block.start;i<=block.end;i++){
    const cell = state.rows[i][col];
    if(cell) lines.push(state.cols[col].lines[cell.idx]);
  }
  return lines;
}

/* Replace the destination column's text region corresponding to the block
   with the source column's lines for that block. */
function mergeBlock(rowIdx, fromCol, toCol){
  const block = findBlockForRow(rowIdx);
  const srcLines = getBlockLines(block, fromCol);

  // Determine destination splice range in toCol.lines:
  // find the first and last non-null cell index in toCol within the block
  let firstIdx=null, lastIdx=null;
  for(let i=block.start;i<=block.end;i++){
    const cell = state.rows[i][toCol];
    if(cell){
      if(firstIdx===null) firstIdx=cell.idx;
      lastIdx=cell.idx;
    }
  }

  const destLines = state.cols[toCol].lines.slice();
  if(firstIdx===null){
    // destination has no lines in this block (pure insertion) -> need to find insertion point
    // find nearest preceding row that has a cell in toCol
    let insertAt = destLines.length;
    for(let i=block.start-1;i>=0;i--){
      const cell = state.rows[i][toCol];
      if(cell){ insertAt = cell.idx+1; break; }
    }
    if(block.start===0) insertAt = 0;
    destLines.splice(insertAt, 0, ...srcLines);
  } else {
    destLines.splice(firstIdx, lastIdx-firstIdx+1, ...srcLines);
  }

  pushHistory(toCol);
  state.cols[toCol].text = destLines.join('\n');
  recompute({keepView:true});
  setStatus(`Merged ${colLabel(fromCol)} → ${colLabel(toCol)}`);
}

/* Delete the diff block only from the clicked column (col argument).
   Lines belonging to that block in that column are removed; other columns untouched. */
function deleteBlock(rowIdx, col){
  const block = findBlockForRow(rowIdx);
  let firstIdx=null, lastIdx=null;
  for(let i=block.start;i<=block.end;i++){
    const cell = state.rows[i][col];
    if(cell){
      if(firstIdx===null) firstIdx=cell.idx;
      lastIdx=cell.idx;
    }
  }
  if(firstIdx!==null){
    const destLines = state.cols[col].lines.slice();
    destLines.splice(firstIdx, lastIdx-firstIdx+1);
    pushHistory(col);
    state.cols[col].text = destLines.join('\n');
  }
  recompute({keepView:true});
  setStatus(`Deleted diff block from ${colLabel(col)}`);
}

/* ======================================================================
   Editing: sync contenteditable back into state.cols[col].text
   ====================================================================== */

function commitColumnEdits(col){
  const container = document.getElementById('lines-'+col);
  // Only collect text from non-empty elements that actually map back to an original file line
  const lineEls = container.querySelectorAll('.line:not(.empty) .content[contenteditable="true"]');
  const newLines = [];
  lineEls.forEach(el=>{ 
    // Read via textContent, and strip any stray \r or layout-affecting special characters
    newLines.push(el.textContent.replace(/\r/g, '')); 
  });
  
  pushHistory(col);
  state.cols[col].text = newLines.join('\n');
}

let editDebounce = null;
function onContentInput(e){
  const col = e.target.dataset.col;
  if(editDebounce) clearTimeout(editDebounce);
  editDebounce = setTimeout(()=>{
    commitColumnEdits(col);
    recompute();
  }, 600);
}

/* ======================================================================
   Undo / Redo
   ====================================================================== */

function undo(col){
  const c = state.cols[col];
  if(c.history.length===0) { setStatus(`${colLabel(col)}: nothing to undo`); return; }
  c.future.push(c.text);
  c.text = c.history.pop();
  recompute();
  setStatus(`Undone — ${colLabel(col)}`);
}
function redo(col){
  const c = state.cols[col];
  if(c.future.length===0) { setStatus(`${colLabel(col)}: nothing to redo`); return; }
  c.history.push(c.text);
  c.text = c.future.pop();
  recompute();
  setStatus(`Redone — ${colLabel(col)}`);
}
function colLabel(col){ return col==='left'?'Left':col==='mid'?'Middle':'Right'; }

/* ======================================================================
   File Open / Save / Refresh
   ====================================================================== */

let fileInputTargetCol = null;

// Sync the path input display from state
function syncPathInput(col){
  const inputId = col === 'mid' ? 'path-mid' : 'path-' + col;
  const el = document.getElementById(inputId);
  if(el) el.value = state.cols[col].fullPath;
}

async function openFile(col){
  // Prefer the File System Access API: it gives us a reusable file handle so
  // the Refresh button can later re-read the file straight from disk.
  if(window.showOpenFilePicker){
    try{
      const [handle] = await window.showOpenFilePicker({ multiple:false });
      const file = await handle.getFile();
      const text = await file.text();
      pushHistory(col);
      state.cols[col].text = text;
      state.cols[col].fullPath = file.name;
      state.cols[col].userLoaded = true;
      state.cols[col].handle = handle;
      syncPathInput(col);
      recompute();
      setStatus(`Opened ${colLabel(col)}: ${file.name}`);
    }catch(err){
      if(err && err.name === 'AbortError') return; // user cancelled the picker
      // Some environments reject showOpenFilePicker (e.g. permissions policy);
      // fall back to the classic file input.
      fileInputTargetCol = col;
      document.getElementById('file-input').click();
    }
    return;
  }
  fileInputTargetCol = col;
  document.getElementById('file-input').click();
}

document.getElementById('file-input').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    const col = fileInputTargetCol;
    pushHistory(col);
    state.cols[col].text = reader.result;
    // Store full path: use webkitRelativePath if available, else just name
    const fullPath = file.webkitRelativePath || file.name;
    state.cols[col].fullPath = fullPath;
    state.cols[col].userLoaded = true;
    state.cols[col].handle = null; // classic <input type=file> cannot yield a re-readable handle
    syncPathInput(col);
    recompute();
    setStatus(`Opened ${colLabel(col)}: ${fullPath}`);
  };
  reader.readAsText(file);
  e.target.value = '';
});

function saveFile(col){
  const text = state.cols[col].text;
  const filename = state.cols[col].fullPath || (col+'.txt');
  const blob = new Blob([text], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename.split(/[\\/]/).pop(); // use only filename part for download
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  setStatus(`Saved ${colLabel(col)}: ${filename}`);
}

async function refreshFile(col){
  const c = state.cols[col];
  const handle = c.handle;

  if(!handle){
    // No re-readable handle (e.g. file was loaded via the classic file
    // picker, or never loaded at all) — browsers don't allow re-reading an
    // arbitrary path for security reasons, so ask the user to pick the file
    // again, same as pressing Enter in the path field.
    if(!c.userLoaded){
      setStatus(`${colLabel(col)}: nothing to refresh — open a file first`);
      return;
    }
    setStatus(`${colLabel(col)}: can't auto-refresh this file — please reselect it`);
    openFile(col);
    return;
  }

  try{
    // Re-confirm read permission in case it was revoked since the file was opened.
    if(handle.queryPermission){
      let perm = await handle.queryPermission({ mode:'read' });
      if(perm !== 'granted'){
        perm = await handle.requestPermission({ mode:'read' });
        if(perm !== 'granted'){
          setStatus(`${colLabel(col)}: permission denied — can't refresh`);
          return;
        }
      }
    }
    const file = await handle.getFile();
    const text = await file.text();
    if(text === c.text){
      setStatus(`${colLabel(col)}: no changes on disk`);
      return;
    }
    pushHistory(col);
    c.text = text;
    recompute();
    setStatus(`Refreshed ${colLabel(col)} from disk: ${file.name}`);
  }catch(err){
    setStatus(`${colLabel(col)}: refresh failed — file may have been moved or deleted`);
  }
}

/* ======================================================================
   Drag & Drop file loading (path bar + editor content area)
   ====================================================================== */

// Only treat the drag as a file drag if the browser reports an actual
// file payload — this keeps normal text drag/drop inside the editable
// content untouched.
function isFileDrag(e){
  return !!(e.dataTransfer && e.dataTransfer.types && Array.from(e.dataTransfer.types).includes('Files'));
}

// Extract every dropped file (not just the first), grabbing FileSystemFileHandles
// synchronously where available so the Refresh button keeps working afterwards.
// Per the File System Access API, getAsFileSystemHandle()/getAsFile() must be
// called synchronously off the drop event before any other await, so all items
// are grabbed up front rather than looping with awaits in between.
async function getAllDroppedFiles(dt){
  const results = [];
  try{
    if(dt.items && dt.items.length){
      const fileItems = Array.from(dt.items).filter(it => it.kind === 'file');
      const handlePromises = fileItems.map(it =>
        typeof it.getAsFileSystemHandle === 'function' ? it.getAsFileSystemHandle() : Promise.resolve(null)
      );
      const fallbackFiles = fileItems.map(it => it.getAsFile());
      const handles = await Promise.all(handlePromises.map(p => Promise.resolve(p).catch(()=>null)));
      for(let i=0;i<fileItems.length;i++){
        let handle = handles[i];
        let file = null;
        if(handle && handle.kind === 'file'){
          try{ file = await handle.getFile(); }catch(err){ handle = null; }
        }
        if(!file) file = fallbackFiles[i];
        if(file) results.push({ file, handle: (handle && handle.kind==='file') ? handle : null });
      }
    }
    if(!results.length && dt.files && dt.files.length){
      Array.from(dt.files).forEach(f => results.push({ file: f, handle: null }));
    }
  }catch(err){
    if(!results.length && dt.files && dt.files.length){
      Array.from(dt.files).forEach(f => results.push({ file: f, handle: null }));
    }
  }
  return results;
}

async function loadFileIntoColumn(col, file, handle){
  const text = await file.text();
  pushHistory(col);
  state.cols[col].text = text;
  state.cols[col].fullPath = file.webkitRelativePath || file.name;
  state.cols[col].userLoaded = true;
  state.cols[col].handle = handle || null; // null if this browser can't give a reusable handle
  syncPathInput(col);
}

function setActiveModeButtons(mode){
  document.getElementById('btn-2way').classList.toggle('active', mode==='2way');
  document.getElementById('btn-3way').classList.toggle('active', mode==='3way');
}

async function loadDroppedFile(col, dt){
  const entries = await getAllDroppedFiles(dt);
  if(!entries.length){ setStatus(`${colLabel(col)}: no file detected in the drop`); return; }

  if(entries.length >= 2){
    // Multiple files dropped at once: auto-switch mode and fill left-to-right,
    // regardless of which specific pane/path bar the files landed on.
    const wantMode = entries.length >= 3 ? '3way' : '2way';
    const useCols = wantMode==='3way' ? ['left','mid','right'] : ['left','right'];
    state.mode = wantMode;
    setActiveModeButtons(wantMode);
    try{
      for(let i=0;i<useCols.length;i++){
        await loadFileIntoColumn(useCols[i], entries[i].file, entries[i].handle);
      }
      recompute();
      const summary = useCols.map((c,i)=>`${colLabel(c)}=${entries[i].file.name}`).join(', ');
      setStatus(`Switched to ${wantMode} and loaded ${useCols.length} files via drag & drop: ${summary}`);
    }catch(err){
      setStatus('Failed to read one or more dropped files');
    }
    return;
  }

  // Single file: load into whichever zone it was dropped on (unchanged behavior)
  try{
    await loadFileIntoColumn(col, entries[0].file, entries[0].handle);
    recompute();
    setStatus(`Loaded ${colLabel(col)} via drag & drop: ${state.cols[col].fullPath}`);
  }catch(err){
    setStatus(`${colLabel(col)}: failed to read dropped file`);
  }
}

function setupDropZone(el, col){
  if(!el) return;
  let dragDepth = 0;
  el.addEventListener('dragenter', (e)=>{
    if(!isFileDrag(e)) return;
    e.preventDefault();
    dragDepth++;
    el.classList.add('drag-over');
  });
  el.addEventListener('dragover', (e)=>{
    if(!isFileDrag(e)) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
  });
  el.addEventListener('dragleave', (e)=>{
    if(!isFileDrag(e)) return;
    dragDepth = Math.max(0, dragDepth-1);
    if(dragDepth===0) el.classList.remove('drag-over');
  });
  el.addEventListener('drop', (e)=>{
    if(!isFileDrag(e)) return;
    e.preventDefault();
    dragDepth = 0;
    el.classList.remove('drag-over');
    loadDroppedFile(col, e.dataTransfer);
  });
}

function setupAllDropZones(){
  // Content area: drop a file anywhere on a pane to load it into that column.
  setupDropZone(document.getElementById('pane-left'), 'left');
  setupDropZone(document.getElementById('pane-mid'), 'mid');
  setupDropZone(document.getElementById('pane-right'), 'right');
}

/* ======================================================================
   Status bar helper
   ====================================================================== */
function setStatus(msg){
  document.getElementById('status-text').textContent = msg;
}

/* ======================================================================
   Scroll sync between panes
   ====================================================================== */
let syncingScroll = false;
function setupScrollSync(){
  const ids = ['scroll-left','scroll-mid','scroll-right'];
  const idToCol = id => id.slice('scroll-'.length);
  ids.forEach(id=>{
    document.getElementById(id).addEventListener('scroll', (e)=>{
      if(syncingScroll) return;
      syncingScroll = true;
      const srcCol = idToCol(id);
      const top = e.target.scrollTop;
      const left = e.target.scrollLeft;
      // Find which row is at this pane's scroll position, then align every
      // other pane to that same row using its own real layout, so the
      // actual diff position stays lined up even if the panes' total
      // rendered heights differ (due to collapsed add/del gaps).
      const row = rowAtOffset(srcCol, top);
      const remainder = top - offsetForRow(srcCol, row);
      ids.forEach(other=>{
        if(other!==id){
          const el = document.getElementById(other);
          if(!el.closest('.pane').classList.contains('hidden')){
            const otherCol = idToCol(other);
            el.scrollTop = Math.max(0, offsetForRow(otherCol, row) + remainder);
            el.scrollLeft = left; // Sync horizontal scroll too, to make diff comparison easier
          }
        }
      });
      syncingScroll = false;
      updateGutterViewport();
    });
  });
}



/* ======================================================================
   Event wiring
   ====================================================================== */

document.getElementById('btn-2way').addEventListener('click', ()=>{
  state.mode='2way';
  document.getElementById('btn-2way').classList.add('active');
  document.getElementById('btn-3way').classList.remove('active');
  recompute();
  setStatus('Switched to 2-way compare');
});
document.getElementById('btn-3way').addEventListener('click', ()=>{
  // When switching from 2-way to 3-way:
  // Keep left and right exactly as they are.
  // Mid stays as-is (empty or previously loaded). Do NOT move right->mid.
  state.mode='3way';
  document.getElementById('btn-3way').classList.add('active');
  document.getElementById('btn-2way').classList.remove('active');
  recompute();
  setStatus('Switched to 3-way compare');
});

document.getElementById('nav-first').addEventListener('click', ()=>goToDiff('first'));
document.getElementById('nav-prev').addEventListener('click', ()=>goToDiff('prev'));
document.getElementById('nav-next').addEventListener('click', ()=>goToDiff('next'));
document.getElementById('nav-last').addEventListener('click', ()=>goToDiff('last'));
document.getElementById('btn-recompute').addEventListener('click', async () => {
  setStatus('Reloading files and recomputing diff...');
  
  // Reload each column that has a previously loaded file, in order
  if (state.cols.left.userLoaded)  await refreshFile('left');
  if (state.mode === '3way' && state.cols.mid.userLoaded)   await refreshFile('mid');
  if (state.cols.right.userLoaded) await refreshFile('right');
  
  // refreshFile already calls recompute() internally on success,
  // but call it again here to force a refresh even if no file actually changed
  recompute();
  setStatus('All files reloaded and diff recomputed');
});

/* Path bar buttons */
document.querySelectorAll('.pathrow .filebtns .tbtn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const act = btn.dataset.act;
    const col = btn.dataset.col;
    if(act==='undo') undo(col);
    else if(act==='redo') redo(col);
    else if(act==='refresh') refreshFile(col);
    else if(act==='open') openFile(col);
    else if(act==='save') saveFile(col);
  });
});

/* Delegate clicks on action buttons (hover icons) and content edits */
document.getElementById('editor-wrap').addEventListener('click', (e)=>{
  const actBtn = e.target.closest('.actbtn');
  if(actBtn){
    const action = actBtn.dataset.action;
    const row = parseInt(actBtn.dataset.row,10);
    const col = actBtn.dataset.col;
    if(action==='copy-right'){
      const toCol = state.mode==='3way'
        ? (col==='left' ? 'mid' : 'right')
        : 'right';
      mergeBlock(row, col, toCol);
    } else if(action==='copy-left'){
      const toCol = state.mode==='3way'
        ? (col==='right' ? 'mid' : 'left')
        : 'left';
      mergeBlock(row, col, toCol);
    } else if(action==='delete-block'){
      deleteBlock(row, col);
    }
  }
});

document.getElementById('editor-wrap').addEventListener('input', (e)=>{
  if(e.target.classList.contains('content') && e.target.isContentEditable){
    onContentInput(e);
  }
});

/* Click on gutter -> jump to proportional file position
   If click lands on a marker, jump to that diff block;
   otherwise jump to the proportional row in the file. */
function setupGutterClicks(){
  ['gutter-lm','gutter-mr'].forEach(gutterId=>{
    const gutterEl = document.getElementById(gutterId);
    if(!gutterEl) return;
    gutterEl.addEventListener('click', (e)=>{
      const gutterH = gutterEl.offsetHeight;
      const totalRows = state.rows.length;
      if(!gutterH || !totalRows) return;

      // y position relative to gutter top
      const rect = gutterEl.getBoundingClientRect();
      const y = e.clientY - rect.top;
      const ratio = Math.max(0, Math.min(1, y / gutterH));

      // Check if a marker was clicked -> jump to that diff block
      const marker = e.target.closest('.marker');
      if(marker){
        const startRow = parseInt(marker.dataset.blockStart, 10);
        const idx = state.diffBlocks.findIndex(b=> startRow>=b.start && startRow<=b.end);
        if(idx>=0){
          state.currentDiffIndex = idx;
          render();
          scrollToRow(startRow);
          updateDiffCounter();
          setStatus(`Jumped to diff ${idx+1} / ${state.diffBlocks.length}`);
          return;
        }
      }

      // Otherwise jump to proportional row
      const targetRow = Math.floor(ratio * totalRows);
      // Find nearest diff block to highlight
      let nearestIdx = -1;
      let nearestDist = Infinity;
      state.diffBlocks.forEach((b, i)=>{
        const dist = Math.min(Math.abs(b.start - targetRow), Math.abs(b.end - targetRow));
        if(dist < nearestDist){ nearestDist = dist; nearestIdx = i; }
      });
      if(nearestIdx >= 0) state.currentDiffIndex = nearestIdx;

      // Scroll all panes to proportional position
      const totalFileH = totalRows * LINE_H;
      const scrollEl = document.getElementById('scroll-left');
      const newScrollTop = Math.max(0, ratio * totalFileH - scrollEl.clientHeight / 2);
      const ids = state.mode==='3way'
        ? ['scroll-left','scroll-mid','scroll-right']
        : ['scroll-left','scroll-right'];
      ids.forEach(id=>{ document.getElementById(id).scrollTop = newScrollTop; });
      updateGutterViewport();
      render();
      updateDiffCounter();
      setStatus(`Jumped to ${Math.round(ratio*100)}% of file`);
    });
  });
}

/* Keyboard shortcuts: Ctrl+Z / Ctrl+Y while focused inside a pane */
document.addEventListener('keydown', (e)=>{
  if(!(e.ctrlKey || e.metaKey)) return;
  const active = document.activeElement;
  const colEl = active && active.closest('.pane');
  if(!colEl) return;
  let col = null;
  if(colEl.id==='pane-left') col='left';
  else if(colEl.id==='pane-mid') col='mid';
  else if(colEl.id==='pane-right') col='right';
  if(!col) return;
  if(e.key==='z' || e.key==='Z'){
    e.preventDefault();
    if(e.shiftKey) redo(col); else undo(col);
  } else if(e.key==='y' || e.key==='Y'){
    e.preventDefault();
    redo(col);
  }
});

/* ======================================================================
   Init
   ====================================================================== */
// Sync path inputs from initial state
syncPathInput('left');
syncPathInput('mid');
syncPathInput('right');
setupScrollSync();
setupGutterClicks();
setupAllDropZones();
recompute();
setStatus('Ready');

// Re-render gutters when window is resized (gutter height changes)
window.addEventListener('resize', ()=>{
  renderGutters();
});
</script>
